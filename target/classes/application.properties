# Application Environment
app.environment=development

# Database Repository Toggle (CACHE or DATABASE)
app.repository.type=DATABASE

# H2 Database Configuration (Development/Testing)
db.url=jdbc:h2:mem:quantitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:db/schema.sql'
db.username=sa
db.password=
db.driver=org.h2.Driver

# Connection Pool Settings
pool.initialSize=5
pool.maxSize=15
pool.timeout=5000
